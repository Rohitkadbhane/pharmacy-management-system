<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reports | Pharmacy Management System</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <h2>Reports & Analytics</h2>
        </div>

        <div class="toolbar">
            <label style="font-size:0.85rem;">From <input type="date" id="fromDate"></label>
            <label style="font-size:0.85rem;">To <input type="date" id="toDate"></label>
            <button class="btn btn-sm" id="applyBtn">Apply</button>
        </div>

        <div class="stats-grid" id="summaryStats"></div>

        <div class="grid-2">
            <div class="card">
                <h3>Revenue Trend</h3>
                <canvas id="revenueChart" height="180"></canvas>
            </div>
            <div class="card">
                <h3>Top Selling Medicines</h3>
                <canvas id="topMedicinesChart" height="180"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Inventory Alerts</h3>
            <div class="grid-2">
                <div>
                    <h4 style="font-size:0.9rem; margin-bottom:0.5rem; color:#6b7280;">Low Stock</h4>
                    <table>
                        <thead><tr><th>Name</th><th>Qty</th><th>Reorder Level</th></tr></thead>
                        <tbody id="lowStockBody"></tbody>
                    </table>
                </div>
                <div>
                    <h4 style="font-size:0.9rem; margin-bottom:0.5rem; color:#6b7280;">Expiring Soon</h4>
                    <table>
                        <thead><tr><th>Name</th><th>Batch</th><th>Expiry</th></tr></thead>
                        <tbody id="expiringBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/reports.js"></script>
</body>
</html>
