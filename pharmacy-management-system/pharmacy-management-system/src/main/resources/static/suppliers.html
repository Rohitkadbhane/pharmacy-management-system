<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suppliers | Pharmacy Management System</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <h2>Suppliers</h2>
            <button class="btn" id="addBtn">+ Add Supplier</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr><th>Name</th><th>Contact Person</th><th>Phone</th><th>Email</th><th>Address</th><th>Actions</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
        <h3 id="modalTitle">Add Supplier</h3>
        <form id="supplierForm">
            <input type="hidden" id="supId">
            <div class="field"><label>Name</label><input type="text" id="name" required></div>
            <div class="field"><label>Contact Person</label><input type="text" id="contactPerson"></div>
            <div class="field"><label>Phone</label><input type="text" id="phone"></div>
            <div class="field"><label>Email</label><input type="email" id="email"></div>
            <div class="field"><label>Address</label><input type="text" id="address"></div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button type="submit" class="btn">Save</button>
            </div>
        </form>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/suppliers.js"></script>
</body>
</html>
